<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Offres | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar glass">
            <div class="logo" style="display: flex; align-items: center; gap: 12px; margin-bottom: 3rem;">
                <img src="" class="app-logo" style="max-height: 35px; display: none;">
                <span class="app-name" style="font-size: 1.2rem; font-weight: 800; color: var(--primary-light);">RH-IA V3</span>
            </div>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
                <a href="index.html" class="btn btn-outline" style="width: 100%;">Tableau de bord</a>
                <a href="jobs.html" class="btn btn-primary" style="width: 100%;">Offres d'emploi</a>
                <a href="candidates.html" class="btn btn-outline" style="width: 100%;">Candidats</a>
                <a href="approvals.html" class="btn btn-outline" style="width: 100%;">Approbations</a>
            </nav>
            <div style="margin-top: auto;">
                <button onclick="authService.logout()" class="btn btn-outline" style="width: 100%;">Déconnexion</button>
            </div>
        </div>

        <div class="main-content">
            <header class="header">
                <h1>Offres d'emploi</h1>
                <button onclick="openCreateModal()" class="btn btn-primary">+ Nouvelle Offre</button>
            </header>

            <div id="jobs-grid" class="stats-grid" style="grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));">
                <!-- Injected -->
            </div>
        </div>
    </div>

    <!-- Modal Creation Offre -->
    <div id="modal-job" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="glass" style="width:600px; padding:2rem; max-height:90vh; overflow-y:auto;">
            <h2>Nouvelle Offre d'emploi</h2>
            <form id="job-form" style="margin-top: 1.5rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Titre du poste</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Référence</label>
                        <input type="text" id="reference" class="form-control">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Département / Entité</label>
                        <input type="text" id="entity_organisationnelle" class="form-control" placeholder="ex: Service Après-Vente">
                    </div>
                    <div class="form-group">
                        <label>Site / Ville</label>
                        <input type="text" id="site" class="form-control" placeholder="ex: Casablanca">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description du poste</label>
                    <textarea id="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Exigences (Skills)</label>
                    <textarea id="requirements" class="form-control" rows="3"></textarea>
                </div>
                
                <h4 style="margin: 1.5rem 0 1rem; color: var(--secondary); font-size: 0.9rem;">Conditions Financières (Budget)</h4>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                    <div class="form-group">
                        <label>Salaire Base</label>
                        <input type="number" id="salaire_base" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Ind. Panier</label>
                        <input type="number" id="indemnite_panier" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Ind. Transp.</label>
                        <input type="number" id="indemnite_transport" class="form-control" value="0">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 2; justify-content: center;">Publier l'offre</button>
                    <button type="button" onclick="closeModal()" class="btn btn-outline" style="flex: 1;">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script src="/static/assets/js/auth.js"></script>
    <script src="/static/assets/js/branding.js"></script>
    <script>
        async function loadJobs() {
            try {
                const data = await apiClient.get("/jobs");
                const grid = document.getElementById("jobs-grid");
                
                grid.innerHTML = data.jobs.map(j => `
                    <div class="glass" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h3 style="margin-bottom: 0.25rem;">${j.title}</h3>
                                <p style="font-size: 0.8rem; color: var(--text-muted);">${j.reference || 'Sans réf.'} • ${j.site}</p>
                            </div>
                            <span class="badge ${j.is_published ? 'badge-success' : 'badge-warning'}">
                                ${j.is_published ? 'Publiée' : 'Brouillon'}
                            </span>
                        </div>
                        <p style="font-size: 0.9rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                            ${j.description || 'Pas de description.'}
                        </p>
                        <div style="margin-top: auto; display: flex; gap: 10px; padding-top: 1rem; border-top: 1px solid var(--border);">
                            ${!j.is_published ? `<button onclick="publishJob('${j.id}')" class="btn btn-primary" style="font-size: 0.8rem; padding: 4px 12px;">Publier</button>` : ''}
                            <button onclick="deleteJob('${j.id}')" class="btn btn-outline" style="font-size: 0.8rem; padding: 4px 12px; border-color: var(--danger); color: var(--danger);">Supprimer</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function openCreateModal() { document.getElementById("modal-job").style.display = "flex"; }
        function closeModal() { document.getElementById("modal-job").style.display = "none"; }

        document.getElementById("job-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const body = {
                title: document.getElementById("title").value,
                reference: document.getElementById("reference").value,
                entity_organisationnelle: document.getElementById("entity_organisationnelle").value,
                site: document.getElementById("site").value,
                description: document.getElementById("description").value,
                requirements: document.getElementById("requirements").value,
                salaire_base: parseFloat(document.getElementById("salaire_base").value) || 0,
                indemnite_panier: parseFloat(document.getElementById("indemnite_panier").value) || 0,
                indemnite_transport: parseFloat(document.getElementById("indemnite_transport").value) || 0
            };
            try {
                await apiClient.post("/jobs", body);
                closeModal();
                loadJobs();
            } catch (e) { alert(e.message); }
        });

        async function publishJob(id) {
            await apiClient.patch(`/jobs/${id}/publish`);
            loadJobs();
        }

        async function deleteJob(id) {
            if (confirm("Supprimer cette offre ?")) {
                await apiClient.delete(`/jobs/${id}`);
                loadJobs();
            }
        }

        loadJobs();
    </script>
</body>
</html>
