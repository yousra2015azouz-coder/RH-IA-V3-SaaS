<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Générale | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar glass">
            <div class="logo" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 3rem; color: var(--primary-light);">RH-IA V3</div>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
                <a href="index.html" class="btn btn-primary" style="width: 100%;">Approbations Finales</a>
            </nav>
            <div style="margin-top: auto;">
                <button onclick="authService.logout()" class="btn btn-outline" style="width: 100%;">Déconnexion</button>
            </div>
        </div>

        <div class="main-content">
            <header class="header">
                <div>
                    <h1>Espace Direction Générale</h1>
                    <p style="color: var(--text-muted);">Visa final et arbitrage stratégique</p>
                </div>
            </header>

            <div class="glass" style="padding: 1.5rem;">
                <h3>Demandes en attente de validation DG</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Candidat</th>
                                <th>Poste</th>
                                <th>Salaire (Annuel)</th>
                                <th>Recommandation IA</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="approvals-list">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Approbation DG avec IA -->
    <div id="modal-sign" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="glass" style="width:600px; padding:2rem; max-height:90vh; overflow-y:auto;">
            <h2>Décision Direction Générale</h2>
            
            <div id="ai-rec-box" class="glass" style="margin:1.5rem 0; padding:1.5rem; border-left:4px solid var(--primary-light);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <h4 style="color:var(--primary-light);">🧠 Analyse & Recommandation IA</h4>
                    <span id="ai-confidence" class="ai-score-tag">Confidence: 0%</span>
                </div>
                <p id="ai-justification" style="font-size:0.9rem; margin-bottom:1rem;"></p>
                <div id="ai-risks" style="font-size:0.85rem; color:var(--danger);"></div>
            </div>

            <div class="form-group">
                <label>Commentaires DG</label>
                <textarea id="sign-comments" class="form-control" rows="4"></textarea>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                <button onclick="submitDecision('APPROVED')" class="btn btn-primary" style="flex:1; justify-content:center; background:var(--success);">Signer & Recruter</button>
                <button onclick="submitDecision('REJECTED')" class="btn btn-outline" style="flex:1; justify-content:center; border-color:var(--danger); color:var(--danger);">Veto DG</button>
                <button onclick="closeModal()" class="btn btn-outline">Annuler</button>
            </div>
        </div>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script src="/static/assets/js/auth.js"></script>
    <script>
        let currentApprovalId = null;

        async function loadApprovals() {
            try {
                const data = await apiClient.get("/approval");
                const list = document.getElementById("approvals-list");
                
                const pending = data.approvals.filter(a => a.status === "pending_dg");

                if (pending.length === 0) {
                    list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted);">Aucune demande en attente.</td></tr>`;
                    return;
                }

                list.innerHTML = pending.map(a => {
                    try {
                        const candidateName = a.nom_collaborateur || "Candidat inconnu";
                        const jobTitle = (a.job_offers && a.job_offers.title) ? a.job_offers.title : 'Poste non spécifié';
                        const salary = (a.salaire_annuel_garanti || 0).toLocaleString();
                        const aiRec = a.groq_recommendation || { decision: 'N/A', confidence: 0 };
                        
                        return `
                            <tr>
                                <td><b>${candidateName}</b></td>
                                <td>${jobTitle}</td>
                                <td>${salary} MAD</td>
                                <td>
                                    <span class="badge ${aiRec.decision === 'APPROVE' ? 'badge-success' : 'badge-warning'}">
                                        IA: ${aiRec.decision}
                                    </span>
                                </td>
                                <td>
                                    <button onclick="openModal('${a.id}', ${JSON.stringify(aiRec).replace(/\"/g, '&quot;')})" class="btn btn-primary" style="padding:4px 10px; font-size:0.8rem;">Examiner</button>
                                </td>
                            </tr>
                        `;
                    } catch (err) {
                        console.error("Erreur rendu ligne:", err, a);
                        return "";
                    }
                }).join('');
            } catch (e) { console.error(e); }
        }

        function openModal(id, aiRec) {
            currentApprovalId = id;
            if (aiRec) {
                document.getElementById("ai-confidence").textContent = `Confiance: ${aiRec.confidence}%`;
                document.getElementById("ai-justification").textContent = aiRec.justification;
                document.getElementById("ai-risks").innerHTML = aiRec.risques.map(r => `• ${r}`).join('<br>');
            } else {
                document.getElementById("ai-confidence").textContent = `Confiance: N/A`;
                document.getElementById("ai-justification").textContent = "L'analyse IA n'a pas été générée ou est indisponible pour ce candidat.";
                document.getElementById("ai-risks").innerHTML = "Aucun risque analysé.";
            }
            document.getElementById("modal-sign").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal-sign").style.display = "none";
        }

        async function submitDecision(decision) {
            const comments = document.getElementById("sign-comments").value;
            try {
                await apiClient.post(`/approval/${currentApprovalId}/sign`, { decision, comments });
                closeModal();
                loadApprovals();
            } catch (e) { alert(e.message); }
        }

        loadApprovals();
    </script>
</body>
</html>
