<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Fonctionnelle | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar glass">
            <div class="logo" style="display: flex; align-items: center; gap: 12px; margin-bottom: 3rem;">
                <img src="" class="app-logo" style="max-height: 35px; display: none;">
                <span class="app-name" style="font-size: 1.2rem; font-weight: 800; color: var(--text-main);">RH-IA V3</span>
            </div>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
                <a href="index.html" class="btn btn-primary" style="width: 100%;">Approbations</a>
            </nav>
            <div style="margin-top: auto;">
                <button onclick="authService.logout()" class="btn btn-outline" style="width: 100%;">Déconnexion</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="header">
                <div>
                    <h1>Espace Directeur Fonctionnel</h1>
                    <p style="color: var(--text-muted);">Validation métier des recrutements</p>
                </div>
            </header>

            <div class="glass" style="padding: 1.5rem;">
                <h3>Demandes en attente de votre visa</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Candidat</th>
                                <th>Poste</th>
                                <th>Salaire Proposé</th>
                                <th>Statut Workflow</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="approvals-list">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Approbation -->
    <div id="modal-sign" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="glass" style="width:500px; padding:2rem;">
            <h2>Décision Approbation</h2>
            <p id="modal-desc" style="margin:1rem 0; color:var(--text-muted);"></p>
            <div class="form-group">
                <label>Commentaires (optionnel)</label>
                <textarea id="sign-comments" class="form-control" rows="4"></textarea>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                <button onclick="submitDecision('APPROVED')" class="btn btn-primary" style="flex:1; justify-content:center; background:var(--success);">Approuver</button>
                <button onclick="submitDecision('REJECTED')" class="btn btn-outline" style="flex:1; justify-content:center; border-color:var(--danger); color:var(--danger);">Rejeter</button>
                <button onclick="closeModal()" class="btn btn-outline">Annuler</button>
            </div>
        </div>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script src="/static/assets/js/auth.js"></script>
    <script src="/static/assets/js/branding.js"></script>
    <script>
        let currentApprovalId = null;

        async function loadApprovals() {
            try {
                const data = await apiClient.get("/approval");
                const list = document.getElementById("approvals-list");
                
                const pending = data.approvals.filter(a => a.status === "pending_fonctionnel");

                if (pending.length === 0) {
                    list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted);">Aucune demande en attente.</td></tr>`;
                    return;
                }

                list.innerHTML = pending.map(a => `
                    <tr>
                        <td><b>${a.candidates.first_name} ${a.candidates.last_name}</b></td>
                        <td>${a.job_offers.title}</td>
                        <td>${a.salaire_mensuel_net.toLocaleString()} MAD (Net)</td>
                        <td><span class="badge badge-warning">En attente Fonctionnel</span></td>
                        <td style="display:flex; gap:5px;">
                            <button onclick="apiClient.viewPdf('/approval/${a.id}/pdf')" class="btn btn-outline" style="padding:4px 10px; font-size:0.8rem;">Voir PDF</button>
                            <button onclick="openModal('${a.id}', '${a.candidates.first_name} ${a.candidates.last_name}')" class="btn btn-primary" style="padding:4px 10px; font-size:0.8rem;">Décider</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function openModal(id, name) {
            currentApprovalId = id;
            document.getElementById("modal-desc").textContent = "Validation du recrutement pour " + name;
            document.getElementById("modal-sign").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal-sign").style.display = "none";
        }

        async function submitDecision(decision) {
            const comments = document.getElementById("sign-comments").value;
            try {
                await apiClient.post(`/approval/${currentApprovalId}/sign`, { decision, comments });
                closeModal();
                loadApprovals();
            } catch (e) { alert(e.message); }
        }

        loadApprovals();
    </script>
</body>
</html>
