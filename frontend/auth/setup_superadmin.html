<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Super Admin | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .setup-box { width: 100%; max-width: 500px; padding: 3rem; }
    </style>
</head>
<body>
    <div class="setup-box glass">
        <h2 style="margin-bottom: 2rem; color: var(--primary-light);">Initialisation Super Admin</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">
            Cette page permet de créer le premier compte administrateur de la plateforme.
        </p>
        
        <form id="setup-form">
            <div class="form-group">
                <label>Clé Secrète Master</label>
                <input type="password" id="secret_key" class="form-control" placeholder="Clé d'installation" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="first_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="last_name" class="form-control" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email Administrateur</label>
                <input type="email" id="email" class="form-control" placeholder="admin@platform.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Créer mon compte Super Admin
            </button>
        </form>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script>
        document.getElementById("setup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const body = {
                first_name: document.getElementById("first_name").value,
                last_name: document.getElementById("last_name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                tenant_slug: "master" // Sera géré par le backend
            };
            const secret_key = document.getElementById("secret_key").value;

            try {
                const res = await apiClient.post(`/auth/setup-superadmin?secret_key=${secret_key}`, body);
                alert(res.message);
                window.location.href = "/static/auth/login.html";
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        });
    </script>
</body>
</html>
