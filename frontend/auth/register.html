<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .register-box { width: 100%; max-width: 450px; padding: 2.5rem; }
    </style>
</head>
<body>
    <div class="register-box glass">
        <h2 style="margin-bottom: 2rem; text-align: center;">Rejoindre la plateforme</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Code Entreprise (Slug)</label>
                <input type="text" id="tenant_slug" class="form-control" placeholder="ex: demo" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="first_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="last_name" class="form-control" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Créer mon compte candidat
            </button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            Déjà un compte ? <a href="login.html" style="color: var(--primary-light);">Se connecter</a>
        </p>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const body = {
                first_name: document.getElementById("first_name").value,
                last_name: document.getElementById("last_name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                tenant_slug: document.getElementById("tenant_slug").value
            };

            try {
                const res = await apiClient.post("/auth/signup", body);
                alert(res.message);
                window.location.href = "login.html";
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        });
    </script>
</body>
</html>
