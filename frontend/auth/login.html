<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="login-box glass">
        <div class="logo">RH-IA V3</div>
        <h2 style="margin-bottom: 2rem;">Accès Plateforme</h2>
        
        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label>Email</label>
                <input type="email" id="email" class="form-control" placeholder="votre@email.com" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Mot de passe</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Se connecter</button>
        </form>

        <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            Pas encore de compte ? <a href="/static/auth/register.html" style="color: var(--primary-light);">S'inscrire</a>
        </p>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script src="/static/assets/js/auth.js"></script>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            await authService.login(email, password);
        });
    </script>
</body>
</html>
