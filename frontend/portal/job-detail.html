<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails de l'offre | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
    <style>
        body {
            background-color: var(--bg-dark);
        }
        .detail-container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; position: relative; z-index: 10; }
        .job-header { 
            background: var(--accent); 
            padding: 3rem; 
            border-radius: 16px 16px 0 0;
            border-bottom: 4px solid var(--secondary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .job-body {
            background: #111827; /* Slightly lighter than bg-dark for depth */
            padding: 3rem;
            border-radius: 0 0 0 16px;
            border: 1px solid var(--border);
            border-top: none;
        }
        .section { margin-bottom: 2.5rem; }
        .section h3 { margin-bottom: 1.2rem; color: var(--secondary); display: flex; align-items: center; gap: 10px; font-size: 1.1rem; }
        .section h3::before { content: ""; width: 4px; height: 20px; background: var(--secondary); display: inline-block; border-radius: 2px; }
        
        /* High Contrast Sidebar */
        .sidebar-info { 
            padding: 2rem; 
            position: sticky; 
            top: 2rem; 
            background: #FFFFFF; 
            color: #1E293B; 
            border-radius: 0 0 16px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sidebar-info .info-label {
            color: #64748B;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }
        .sidebar-info .info-value {
            color: #1E293B;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="zellige-overlay"></div>
    <div class="detail-container">
        <div class="job-header">
            <a href="dashboard.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Retour au tableau de bord</a>
            <h1 id="job-title" style="margin-top: 1.5rem; font-size: 2.5rem; color: white;">Chargement...</h1>
            <div id="job-meta" style="color: var(--text-muted); margin-top: 0.5rem; display: flex; gap: 20px;"></div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-top: -1px;">
            <div class="job-body">
                <div class="section">
                    <h3>Missions & Responsabilités</h3>
                    <div id="job-description" style="white-space: pre-line; color: var(--text-main);">...</div>
                </div>

                <div class="section">
                    <h3>Profil Recherché</h3>
                    <div id="job-requirements" style="white-space: pre-line; color: var(--text-main);">...</div>
                </div>
            </div>

            <aside>
                <div class="sidebar-info">
                    <h4 style="margin-bottom: 2rem; color: var(--accent); font-size: 1.2rem; border-bottom: 2px solid var(--secondary); padding-bottom: 0.5rem;">Synthèse de l'offre</h4>
                    <div style="display: flex; flex-direction: column;">
                        <div>
                            <p class="info-label">Référence</p>
                            <p id="info-ref" class="info-value">...</p>
                        </div>
                        <div>
                            <p class="info-label">Site d'affectation</p>
                            <p id="info-site" class="info-value">...</p>
                        </div>
                        <div>
                            <p class="info-label">Entité</p>
                            <p id="info-entity" class="info-value">...</p>
                        </div>
                        <div>
                            <p class="info-label">Type de contrat</p>
                            <p class="info-value">CDI (Titularisation)</p>
                        </div>
                    </div>
                    <button id="apply-btn" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 2rem; padding: 1rem; background: var(--secondary); color: var(--bg-dark);">
                        Postuler à cette offre
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        // Accepter id ou job_id pour plus de flexibilité
        const jobId = params.get("id") || params.get("job_id");

        async function loadJobDetail() {
            try {
                // 1. Charger les détails de l'offre
                const data = await apiClient.get(`/jobs/public/demo/${jobId}`);
                const job = data.job;

                document.getElementById("job-title").textContent = job.title;
                document.getElementById("job-meta").innerHTML = `
                    <span>📍 ${job.site}</span>
                    <span>📁 ${job.entity_organisationnelle}</span>
                `;
                document.getElementById("job-description").textContent = job.description;
                document.getElementById("job-requirements").textContent = job.requirements;
                
                document.getElementById("info-site").textContent = job.site;
                document.getElementById("info-ref").textContent = job.reference || "OFFRE-" + job.id.substring(0,8);
                document.getElementById("info-entity").textContent = job.entity_organisationnelle;

                // 2. Vérifier si l'utilisateur a déjà postulé
                const token = apiClient.getToken();
                const applyBtn = document.getElementById("apply-btn");

                if (token) {
                    try {
                        const appRes = await apiClient.get('/candidate/applications');
                        const alreadyApplied = (appRes.applications || []).some(a => a.job_offers && a.job_offers.id === jobId);
                        
                        if (alreadyApplied) {
                            applyBtn.innerHTML = "✅ Candidature déjà envoyée";
                            applyBtn.disabled = true;
                            applyBtn.style.background = "#94a3b8"; // Gris neutre
                            applyBtn.style.color = "white";
                            applyBtn.style.cursor = "default";
                        } else {
                            applyBtn.onclick = () => window.location.href = `apply.html?job_id=${jobId}`;
                        }
                    } catch (e) {
                        console.error("Erreur check application:", e);
                        applyBtn.onclick = () => window.location.href = `apply.html?job_id=${jobId}`;
                    }
                } else {
                    // Non connecté
                    applyBtn.innerHTML = '🔐 Se connecter pour postuler';
                    applyBtn.onclick = () => {
                        window.location.href = `/static/auth/login.html?redirect=${encodeURIComponent(window.location.href)}`;
                    };
                }
            } catch (error) {
                console.error(error);
                alert("Erreur lors du chargement des détails de l'offre.");
            }
        }

        if (jobId) loadJobDetail();
    </script>
</body>
</html>
