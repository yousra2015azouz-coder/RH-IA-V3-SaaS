<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postuler | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
    <style>
        .apply-container { max-width: 800px; margin: 4rem auto; padding: 0 2rem; }
        .step { display: none; }
        .step.active { display: block; }
        .chatbot-bubble {
            margin-bottom: 1rem;
            max-width: 80%;
            padding: 1rem;
            border-radius: 12px;
        }
        .bubble-assistant { background: var(--primary); align-self: flex-start; }
        .bubble-user { background: var(--bg-card); align-self: flex-end; margin-left: auto; }
    </style>
</head>
<body>
    <div class="apply-container">
        <!-- Étape 1: Formulaire + CV -->
        <div id="step-1" class="step active glass" style="padding: 3rem;">
            <h2 style="margin-bottom: 2rem;">Postuler pour : <span id="job-title">...</span></h2>
            <form id="apply-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="text" name="phone" class="form-control">
                </div>
                <div class="form-group">
                    <label>Votre CV (PDF uniquement)</label>
                    <input type="file" name="cv_file" class="form-control" accept="application/pdf" required>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Envoyer ma candidature
                </button>
            </form>
        </div>

        <!-- Étape 2: Chatbot IA -->
        <div id="step-2" class="step glass" style="padding: 2rem; height: 600px; display: none; flex-direction: column;">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                Entretien de pré-qualification IA
            </h3>
            <div id="chat-window" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding: 1rem;">
                <!-- Messages injectés -->
            </div>
            <div style="margin-top: 1rem; display: flex; gap: 10px;">
                <input type="text" id="chat-input" class="form-control" placeholder="Écrivez votre réponse...">
                <button id="send-chat" class="btn btn-primary">Envoyer</button>
            </div>
        </div>

        <!-- Étape 3: Confirmation -->
        <div id="step-3" class="step glass" style="padding: 4rem; text-align: center; display: none;">
            <div style="font-size: 4rem; color: var(--success); margin-bottom: 1.5rem;">✓</div>
            <h2>Candidature Terminée !</h2>
            <p style="color: var(--text-muted); margin-top: 1rem;">
                Merci de votre participation. Notre équipe RH va examiner votre profil et vous recontactera prochainement.
            </p>
            <a href="index.html" class="btn btn-outline" style="margin-top: 2rem;">Retour aux offres</a>
        </div>
    </div>

    <script src="/static/assets/js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const jobId = params.get("job_id");
        let sessionId = null;
        let candidateId = null;

        // Charger titre du job
        async function loadJob() {
            const data = await apiClient.get(`/jobs/public/demo/${jobId}`);
            document.getElementById("job-title").textContent = data.job.title;
        }
        loadJob();

        // Submit Form
        document.getElementById("apply-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            btn.disabled = true;
            btn.textContent = "Analyse CV en cours...";

            const formData = new FormData(e.target);
            try {
                const res = await apiClient.upload(`/jobs/${jobId}/apply`, formData);
                candidateId = res.candidate_id;
                
                // Démarrer session chatbot
                const session = await apiClient.post(`/chatbot/session/${candidateId}`);
                sessionId = session.session_id;

                // Passer à l'étape chatbot
                document.getElementById("step-1").style.display = "none";
                document.getElementById("step-2").style.display = "flex";
                
                addMessage("assistant", "Bonjour ! Je suis l'assistant RH. Merci d'avoir postulé. Pour mieux vous connaître, j'ai quelques questions à vous poser. Présentez-vous et expliquez votre motivation pour ce poste.");
            } catch (error) {
                alert(error.message);
                btn.disabled = false;
                btn.textContent = "Envoyer ma candidature";
            }
        });

        // Chatbot Logic
        async function sendChat() {
            const input = document.getElementById("chat-input");
            const msg = input.value.trim();
            if (!msg) return;

            addMessage("user", msg);
            input.value = "";

            try {
                const res = await apiClient.post("/chatbot/message", {
                    session_id: sessionId,
                    message: msg
                });

                addMessage("assistant", res.response);

                if (res.is_completed) {
                    setTimeout(() => {
                        document.getElementById("step-2").style.display = "none";
                        document.getElementById("step-3").style.display = "block";
                    }, 2000);
                }
            } catch (error) {
                console.error("Chat error:", error);
            }
        }

        document.getElementById("send-chat").addEventListener("click", sendChat);
        document.getElementById("chat-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendChat();
        });

        function addMessage(role, text) {
            const win = document.getElementById("chat-window");
            const div = document.createElement("div");
            div.className = `chatbot-bubble glass bubble-${role}`;
            div.textContent = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
