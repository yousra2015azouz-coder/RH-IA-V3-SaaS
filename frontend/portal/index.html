<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Recrutement | RH IA Platform</title>
    <link rel="stylesheet" href="/static/assets/css/theme.css">
    <style>
        .hero { height:400px; background:linear-gradient(rgba(15,23,42,0.7),rgba(15,23,42,0.95)),url('/static/assets/images/hero.png'); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; text-align:center; margin-bottom:4rem; border-bottom:2px solid var(--secondary); }
        .search-container { max-width:1000px; margin:-60px auto 4rem auto; padding:2rem; display:grid; grid-template-columns:2fr 1fr 1fr auto; gap:1rem; position:relative; z-index:10; }
        .container { max-width:1100px; margin:0 auto; padding:0 2rem; }
        .portal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem; }
        .portal-header h2 { font-size: 1.8rem; font-weight: 700; color: var(--text-main); }
        
        /* Premium Job Cards */
        #jobs-list { display: flex; flex-direction: column; gap: 1.2rem; }
        .job-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.8rem 2.2rem; border-radius: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .job-item::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--secondary); opacity: 0; transition: 0.3s;
        }
        .job-item:hover { 
            transform: translateX(10px); 
            background: rgba(255, 255, 255, 0.06); 
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .job-item:hover::before { opacity: 1; }

        .job-info h3 { font-size: 1.3rem; margin-bottom: 0.8rem; color: var(--secondary); letter-spacing: -0.02em; }
        .job-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-muted); align-items: center; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; }
        .meta-item i { font-size: 1rem; color: rgba(255,255,255,0.3); }

        .job-actions { display: flex; align-items: center; gap: 1.2rem; }
        .ref-badge { font-size: 0.75rem; color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; }

        /* Nav Bar */
        .top-nav { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(10,15,30,0.85); backdrop-filter:blur(15px); border-bottom:1px solid rgba(255,255,255,0.08); padding:0.9rem 2.5rem; display:flex; justify-content:space-between; align-items:center; }
        .top-nav .logo { font-size:1.4rem; font-weight:800; color:var(--secondary); letter-spacing: -1px; }
        .top-nav .nav-actions { display:flex; gap:1rem; align-items:center; }
        .btn-login { padding:0.6rem 1.4rem; border:1px solid rgba(255,255,255,0.15); border-radius:12px; color:rgba(255,255,255,0.8); background:transparent; cursor:pointer; font-family:inherit; font-size:0.9rem; font-weight: 500; transition:all 0.3s; text-decoration:none; }
        .btn-login:hover { background:rgba(255,255,255,0.1); color:white; border-color: white; }
        .btn-register { padding:0.6rem 1.4rem; background: var(--secondary); border:none; border-radius:12px; color:var(--bg-main); cursor:pointer; font-family:inherit; font-size:0.9rem; font-weight:700; transition:all 0.3s; text-decoration:none; display: flex; align-items: center; gap: 8px; }
        .btn-register:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(16, 185, 129, 0.4); filter: brightness(1.1); }
        body { padding-top:60px; background-color: #0a0f1e; }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="top-nav">
        <div class="logo">🚀 RH-IA V3</div>
        <div class="nav-actions" id="nav-actions">
            <a href="/static/portal/register.html" class="btn-login">Créer un compte</a>
            <a href="/static/auth/login.html" class="btn-register">Se connecter</a>
        </div>
    </nav>

    <header class="hero">
        <div>
            <h1 id="hero-title" style="font-size: 3.5rem; margin-bottom: 1rem;">Votre Avenir Commence Ici</h1>
            <p id="hero-subtitle" style="font-size: 1.2rem; color: var(--text-muted);">Découvrez les opportunités de carrière</p>
        </div>
    </header>

    <div class="container">
        <div class="glass search-container">
            <input type="text" class="form-control" placeholder="Titre du poste, mots-clés...">
            <select class="form-control">
                <option value="">Tous les sites</option>
                <option value="Casablanca">Casablanca</option>
                <option value="Rabat">Rabat</option>
                <option value="Tanger">Tanger</option>
            </select>
            <select class="form-control">
                <option value="">Tous les départements</option>
                <option value="Informatique">Informatique</option>
                <option value="RH">RH</option>
                <option value="Finance">Finance</option>
            </select>
            <button class="btn btn-primary">Rechercher</button>
        </div>

        <div class="portal-header">
            <h2>Offres d'emploi récentes</h2>
            <span style="color: var(--text-muted);"><span id="job-count">0</span> offres disponibles</span>
        </div>

        <div id="jobs-list">
            <!-- Jobs will be injected here as horizontal cards -->
            <p style="text-align: center; padding: 3rem; color: var(--text-muted);">Chargement des offres...</p>
        </div>
    </div>

    <footer style="margin-top: 5rem; padding: 4rem 0; border-top: 1px solid var(--border); text-align: center; background: rgba(0,0,0,0.3);">
        <div class="container">
            <p id="footer-text" style="color: var(--text-muted);">&copy; 2026 RH-IA V3 Platform. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="/static/assets/js/api.js"></script>
    <script src="/static/assets/js/branding.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const tenantSlug = params.get("tenant") || "demo";

        async function loadPublicJobs() {
            try {
                const data = await apiClient.get(`/jobs/public/${tenantSlug}`);
                const list = document.getElementById("jobs-list");
                
                if(data.tenant) {
                    if(document.getElementById("hero-title")) document.getElementById("hero-title").textContent = data.tenant.hero_title || "Votre Avenir Commence Ici";
                    if(document.getElementById("hero-subtitle")) document.getElementById("hero-subtitle").textContent = data.tenant.hero_subtitle || "";
                }
                
                document.getElementById("job-count").textContent = data.jobs.length;

                if (data.jobs.length === 0) {
                    list.innerHTML = `<div class="glass" style="padding: 4rem; text-align: center;">Aucune offre disponible pour le moment.</div>`;
                    return;
                }

                list.innerHTML = data.jobs.map(j => `
                    <div class="job-item animate-fade">
                        <div class="job-info">
                            <h3>${j.title}</h3>
                            <div class="job-meta">
                                <div class="meta-item"><span>📍</span> ${j.site}</div>
                                <div class="meta-item"><span>📁</span> ${j.entity_organisationnelle || 'Direction Technique'}</div>
                                <div class="meta-item"><span>📅</span> ${new Date(j.created_at).toLocaleDateString()}</div>
                                <span class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 12px;">CDI</span>
                            </div>
                        </div>
                        <div class="job-actions">
                            <a href="job-detail.html?job_id=${j.id}" class="btn-login" style="padding: 0.6rem 1.2rem;">Détails</a>
                            <button onclick="handleApply('${j.id}', '${tenantSlug}')" class="btn btn-primary" style="padding: 0.7rem 1.5rem; font-weight:700; border-radius: 12px;">Postuler →</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                document.getElementById("jobs-list").innerHTML = `<p style="color: var(--danger); text-align: center;">Erreur lors du chargement des offres.</p>`;
            }
        }

        loadPublicJobs();

        // Vérifier si connecté → adapter la nav
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (token && user.email) {
            document.getElementById('nav-actions').innerHTML = `
                <span style="color:rgba(255,255,255,0.5);font-size:0.9rem;">${user.email}</span>
                <a href="/static/portal/dashboard.html" class="btn-register">Mon Espace →</a>
            `;
        }

        function handleApply(jobId, slug) {
            const tok = localStorage.getItem('access_token');
            if (!tok) {
                // Sauvegarder l'offre cible pour y revenir après connexion
                localStorage.setItem('redirect_after_login', `/static/portal/job-detail.html?job_id=${jobId}`);
                localStorage.setItem('pending_job_id', jobId);
                window.location.href = `/static/portal/register.html?job_id=${jobId}&tenant=${slug}`;
            } else {
                window.location.href = `/static/portal/job-detail.html?job_id=${jobId}`;
            }
        }
    </script>
</body>
</html>
